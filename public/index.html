<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>IAFLIX 🎬</title>
<link rel="icon" href="/favicon.ico">

<style>
body {
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
}

/* SIDEBAR */
.sidebar {
  position:fixed;
  width:220px;
  height:100%;
  background:black;
  padding-top:20px;
}

.sidebar input {
  width:80%;
  margin:10px;
  padding:8px;
  border-radius:5px;
  border:none;
}

.sidebar ul {
  list-style:none;
  padding:0;
}

.sidebar li {
  padding:15px;
  cursor:pointer;
  border-bottom:1px solid #222;
}

.sidebar li:hover {
  background:#222;
}

/* MAIN */
.main {
  margin-left:220px;
}

/* HERO */
.hero {
  height:60vh;
  background-size:cover;
  display:flex;
  align-items:end;
  padding:30px;
}

.hero-content {
  background:rgba(0,0,0,0.5);
  padding:20px;
  border-radius:10px;
}

/* VIDEO */
video {
  width:80%;
  margin:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="sidebar">

<input type="text" placeholder="🔍 Buscar..." oninput="buscar(this.value)">

<ul>
<li onclick="inicio()">🏠 Inicio</li>
<li onclick="filtrar('serie')">🎬 Series</li>
<li onclick="filtrar('pelicula')">🎥 Películas</li>
<li onclick="filtrar('musica')">🎵 Música</li>
<li onclick="filtrar('anime')">🧩 Anime</li>
<li onclick="verFavoritos()">⭐ Favoritos</li>
<li onclick="verHistorial()">🕓 Historial</li>
</ul>

</div>

<div class="main">

<h2 style="padding:10px;">👤 <span id="user"></span></h2>

<div id="hero" class="hero">
  <div class="hero-content">
    <h1 id="titulo"></h1>
    <p id="desc"></p>

    <button onclick="play()">▶️ Play</button>
    <button onclick="fav()">⭐ Favorito</button>
  </div>
</div>

<div id="lista"></div>

<video id="player" controls></video>

</div>

<script>

/* =========================
   🌐 API DINÁMICA (FIX PRO)
========================= */
const API = window.location.origin

const token = localStorage.getItem("token")

if(!token){
  location.href = "login-user.html"
}

/* =========================
   👤 PERFIL
========================= */
fetch(API + "/me",{
  headers:{ Authorization:"Bearer "+token }
})
.then(r=>r.json())
.then(user=>{
  if(!user) return

  document.getElementById("user").innerText = user.username || ""

  if(!user.perfilActivo){
    window.location.href="perfiles.html"
  }
})
.catch(()=>console.log("Error /me"))

let todas = []
let actual = null
const player = document.getElementById("player")

/* =========================
   📺 CARGAR CONTENIDO
========================= */
fetch(API + "/series")
.then(r=>r.json())
.then(data=>{
  if(!Array.isArray(data)){
    console.log("Error backend:", data)
    return
  }

  todas = data
  renderFilas(data)

  if(data.length) select(data[0])
})
.catch(()=>console.log("Error /series"))

/* =========================
   🎬 FILAS
========================= */
function renderFilas(data){
  const cont = document.getElementById("lista")
  cont.innerHTML=""

  const categorias = ["serie","pelicula","musica","anime"]

  categorias.forEach(tipo=>{
    const fila = data.filter(s=>s.tipo===tipo)

    if(!fila.length) return

    const div = document.createElement("div")

    div.innerHTML = `
      <h2 style="margin-left:10px">${tipo.toUpperCase()}</h2>
      <div style="display:flex;gap:10px;overflow-x:auto;padding:10px">
        ${fila.map(s=>`
          <img src="${s.portada}" width="150"
          style="border-radius:8px;cursor:pointer"
          onclick='select(${JSON.stringify(s)})'>
        `).join("")}
      </div>
    `

    cont.appendChild(div)
  })
}

/* =========================
   🎬 SELECT
========================= */
function select(s){
  actual = s

  document.getElementById("hero").style.backgroundImage = `url(${s.portada})`
  document.getElementById("titulo").innerText = s.titulo
  document.getElementById("desc").innerText = s.descripcion
}

/* =========================
   ▶️ PLAY
========================= */
function play(){
  if(!actual) return

  player.src = actual.video
  player.play()

  player.ontimeupdate = () => {
    fetch(API + "/historial/"+actual._id,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        Authorization:"Bearer "+token
      },
      body: JSON.stringify({
        tiempo: player.currentTime
      })
    })
  }
}

/* =========================
   ▶️ AUTOPLAY
========================= */
player.onended = () => {
  const index = todas.findIndex(s => s._id === actual._id)

  if(index !== -1 && todas[index+1]){
    select(todas[index+1])
    play()
  }
}

/* =========================
   ⭐ FAVORITOS
========================= */
function fav(){
  if(!actual) return

  fetch(API + "/favoritos/"+actual._id,{
    method:"POST",
    headers:{ Authorization:"Bearer "+token }
  })

  alert("⭐ Guardado")
}

/* =========================
   🔍 BUSCAR
========================= */
function buscar(texto){
  texto = texto.toLowerCase()

  const filtradas = todas.filter(s =>
    s.titulo.toLowerCase().includes(texto)
  )

  renderFilas(filtradas)
}

/* =========================
   🏠 INICIO
========================= */
function inicio(){
  renderFilas(todas)
}

/* =========================
   🎬 FILTRO
========================= */
function filtrar(tipo){
  const filtradas = todas.filter(s => s.tipo === tipo)
  renderFilas(filtradas)
}

/* =========================
   ⭐ FAVORITOS
========================= */
function verFavoritos(){
  fetch(API + "/favoritos",{
    headers:{ Authorization:"Bearer "+token }
  })
  .then(r=>r.json())
  .then(renderFilas)
}

/* =========================
   🕓 HISTORIAL
========================= */
function verHistorial(){
  fetch(API + "/historial",{
    headers:{ Authorization:"Bearer "+token }
  })
  .then(r=>r.json())
  .then(data=>{
    const lista = data.map(h => h.serie)
    renderFilas(lista)
  })
}

</script>

</body>
</html>
