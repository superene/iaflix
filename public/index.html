<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>IAFLIX 🎬</title>

<style>
body {
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
}

/* SIDEBAR */
.sidebar {
  position:fixed;
  width:220px;
  height:100%;
  background:black;
  padding-top:20px;
}

.sidebar input {
  width:80%;
  margin:10px;
  padding:8px;
  border-radius:5px;
  border:none;
}

.sidebar ul {
  list-style:none;
  padding:0;
}

.sidebar li {
  padding:15px;
  cursor:pointer;
  border-bottom:1px solid #222;
}

.sidebar li:hover {
  background:#222;
}

/* MAIN */
.main {
  margin-left:220px;
}

/* HERO */
.hero {
  height:60vh;
  background-size:cover;
  display:flex;
  align-items:end;
  padding:30px;
}

.hero-content {
  background:rgba(0,0,0,0.5);
  padding:20px;
  border-radius:10px;
}

/* VIDEO */
video {
  width:80%;
  margin:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="sidebar">

<input type="text" placeholder="🔍 Buscar..." oninput="buscar(this.value)">

<ul>
<li onclick="inicio()">🏠 Inicio</li>
<li onclick="filtrar('serie')">🎬 Series</li>
<li onclick="filtrar('pelicula')">🎥 Películas</li>
<li onclick="filtrar('musica')">🎵 Música</li>
<li onclick="filtrar('anime')">🧩 Anime</li>
<li onclick="logout()">🚪 Cerrar sesión</li>
</ul>

</div>

<div class="main">

<h2 style="padding:10px;">👤 <span id="user"></span></h2>

<div id="hero" class="hero">
  <div class="hero-content">
    <h1 id="titulo"></h1>
    <p id="desc"></p>

    <button onclick="play()">▶️ Play</button>
  </div>
</div>

<div id="lista"></div>

<video id="player" controls></video>

</div>

<script>

/* =========================
   🌐 API
========================= */
const API = window.location.origin
const token = localStorage.getItem("token")

if (!token || token === "null" || token === "undefined") {
  localStorage.removeItem("token")
  location.href = "/login-user.html"
}

/* =========================
   👤 PERFIL
========================= */
async function checkPerfil() {
  try {
    const res = await fetch(API + "/me", {
      headers: { Authorization: "Bearer " + token }
    })

    if (!res.ok) throw new Error()

    const user = await res.json()

    document.getElementById("user").innerText = user.username || "Usuario"

    // 🔥 FIX: validar perfil activo correctamente
    if (!user.perfilActivo) {
      window.location.href = "/perfiles.html"
      return false
    }

    return true

  } catch (err) {
    localStorage.removeItem("token")
    window.location.href = "/login-user.html"
    return false
  }
}

/* =========================
   🚀 INIT
========================= */
let todas = []
let actual = null
const player = document.getElementById("player")

async function init() {

  const ok = await checkPerfil()
  if (!ok) return

  try {
    const res = await fetch(API + "/series")

    const data = await res.json()

    if (!Array.isArray(data)) return

    todas = data
    renderFilas(data)

    if (data.length) select(data[0])

  } catch {
    console.log("Error cargando series")
  }
}

init()

/* =========================
   🎬 FILAS
========================= */
function renderFilas(data){
  const cont = document.getElementById("lista")
  cont.innerHTML=""

  data.forEach(s=>{
    const img = document.createElement("img")
    img.src = s.portada
    img.width = 150
    img.style.borderRadius = "8px"
    img.style.cursor = "pointer"

    img.onclick = () => select(s)

    cont.appendChild(img)
  })
}

/* =========================
   🎬 SELECT
========================= */
function select(s){
  actual = s

  document.getElementById("hero").style.backgroundImage = `url(${s.portada})`
  document.getElementById("titulo").innerText = s.titulo
  document.getElementById("desc").innerText = s.descripcion
}

/* =========================
   ▶️ PLAY
========================= */
function play(){
  if(!actual) return

  player.src = actual.video
  player.load()
  player.play().catch(()=>{})
}

/* =========================
   🔍 BUSCAR
========================= */
function buscar(texto){
  texto = texto.toLowerCase()

  const filtradas = todas.filter(s =>
    s.titulo.toLowerCase().includes(texto)
  )

  renderFilas(filtradas)
}

/* =========================
   🏠 INICIO
========================= */
function inicio(){
  renderFilas(todas)
}

/* =========================
   🎬 FILTRO
========================= */
function filtrar(tipo){
  const filtradas = todas.filter(s => s.tipo === tipo)
  renderFilas(filtradas)
}

/* =========================
   🚪 LOGOUT
========================= */
function logout(){
  localStorage.removeItem("token")
  window.location.href = "/login-user.html"
}

</script>

</body>
</html>
