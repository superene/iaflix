<script>
const API = location.hostname.includes("localhost")
  ? "http://localhost:3000"
  : "https://iaflix.onrender.com"

const token = localStorage.getItem("token")

// 🔒 Protección total
if (!token) {
  window.location.href = "/login-user.html"
}

// 🔥 Cargar usuario
async function cargarPerfiles() {
  try {
    const res = await fetch(API + "/me", {
      headers: { Authorization: "Bearer " + token }
    })

    if (!res.ok) throw new Error("Token inválido")

    const user = await res.json()

    // 🔥 Validación PRO
    if (!user || !Array.isArray(user.perfiles)) {
      throw new Error("Datos corruptos")
    }

    const cont = document.getElementById("perfiles")
    cont.innerHTML = ""

    user.perfiles.forEach(p => {
      const div = document.createElement("div")
      div.className = "perfil"

      div.innerHTML = `
        <div style="font-size:60px">${p.avatar}</div>
        <p>${p.nombre}</p>
      `

      div.onclick = async () => {
        try {
          const res = await fetch(API + "/perfil", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + token
            },
            body: JSON.stringify({ nombre: p.nombre })
          })

          if (!res.ok) throw new Error()

          // 🚀 ENTRA AL HOME
          window.location.href = "/index.html"

        } catch {
          alert("Error al seleccionar perfil")
        }
      }

      cont.appendChild(div)
    })

  } catch (err) {
    console.log("ERROR:", err.message)

    // 🧹 Limpieza total
    localStorage.removeItem("token")

    window.location.href = "/login-user.html"
  }
}

cargarPerfiles()
</script>
