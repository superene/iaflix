<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfiles</title>

<style>
body {
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

h1 {
  margin-top:50px;
}

/* CONTENEDOR */
.perfiles {
  display:flex;
  justify-content:center;
  gap:40px;
  margin-top:80px;
  flex-wrap:wrap;
}

/* PERFIL */
.perfil {
  cursor:pointer;
  transition:0.3s;
}

.perfil:hover {
  transform:scale(1.1);
}

.avatar {
  width:100px;
  height:100px;
  border-radius:50%;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  margin:auto;
}

.nombre {
  margin-top:10px;
  font-size:18px;
}
</style>
</head>

<body>

<h1>¿Quién está viendo?</h1>

<div id="perfiles" class="perfiles"></div>

<script>


const API = location.hostname.includes("localhost")
  ? "http://localhost:3000"
  : "https://iaflix.onrender.com"

const token = localStorage.getItem("token")

/* =========================
   🔒 PROTECCIÓN
========================= */
if (!token || token === "null" || token === "undefined") {
  localStorage.removeItem("token")
  window.location.href = "/login-user.html"
}

/* =========================
   👤 CARGAR PERFILES
========================= */
async function cargarPerfiles() {
  try {
    const res = await fetch(API + "/me", {
      headers: { Authorization: "Bearer " + token }
    })

    if (!res.ok) throw new Error("Token inválido")

    const user = await res.json()

    console.log("USER:", user)

    const cont = document.getElementById("perfiles")
    cont.innerHTML = ""

    // 🔥 FIX: si no hay perfiles, crear uno automático
    const perfiles = user.perfiles?.length
      ? user.perfiles
      : [{ nombre: "Principal", avatar: "👤" }]

    perfiles.forEach(p => {

      const div = document.createElement("div")
      div.className = "perfil"

      div.innerHTML = `
        <div class="avatar">${p.avatar || "👤"}</div>
        <div class="nombre">${p.nombre}</div>
      `

      div.onclick = async () => {
        try {

          const res = await fetch(API + "/perfil", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + token
            },
            body: JSON.stringify({ nombre: p.nombre })
          })

          if (!res.ok) throw new Error()

          window.location.href = "/index.html"

        } catch (err) {
          console.error(err)
          alert("❌ Error al seleccionar perfil")
        }
      }

      cont.appendChild(div)
    })

  } catch (err) {
    console.log("ERROR:", err.message)

    localStorage.removeItem("token")
    window.location.href = "/login-user.html"
  }
}

/* =========================
   🚀 INIT
========================= */
cargarPerfiles()

</script>

</body>
</html>
