<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Admin PRO</title>

<style>
body {
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
}

h1 { margin-top:30px; }

input, textarea, select {
  display:block;
  margin:10px auto;
  padding:10px;
  width:300px;
  border-radius:5px;
  border:none;
}

button {
  padding:10px 15px;
  margin:5px;
  background:red;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:5px;
  font-weight:bold;
}

button:disabled { background:gray; }

#preview img {
  max-width:150px;
  border-radius:5px;
}

.item {
  border-bottom:1px solid #333;
  padding:10px;
}
</style>
</head>

<body>

<h1>🎬 Panel Admin PRO</h1>

<button onclick="logout()">🚪 Cerrar sesión</button>

<h2>📂 Contenido</h2>
<div id="listaAdmin"></div>

<form id="form">
<input type="text" id="titulo" placeholder="Título" required>
<textarea id="descripcion" placeholder="Descripción"></textarea>

<select id="tipo" required>
  <option value="">Tipo</option>
  <option value="serie">Serie</option>
  <option value="pelicula">Película</option>
  <option value="musica">Música</option>
  <option value="anime">Anime</option>
</select>

<label>Portada</label>
<input type="file" id="portadaInput" accept="image/*" required>

<div id="preview"></div>

<label>Video</label>
<input type="file" id="videoInput" accept="video/*" required>

<button id="btnSubir">Subir</button>

<p id="status"></p>
</form>

<script>
const API = location.hostname.includes("localhost")
  ? "http://localhost:3000"
  : "https://iaflix.onrender.com"

// 🔥 PON TU CLOUD NAME AQUÍ
const CLOUD_NAME = "TU_CLOUD_NAME"

/* =========================
   🔐 VALIDAR ADMIN
========================= */
function validarAdmin() {
  const token = localStorage.getItem("token")

  if (!token) {
    location.href = "/login.html"
    return null
  }

  try {
    const payload = JSON.parse(atob(token.split(".")[1]))

    if (payload.role !== "admin") {
      localStorage.removeItem("token")
      location.href = "/login.html"
      return null
    }

    return token

  } catch {
    localStorage.removeItem("token")
    location.href = "/login.html"
    return null
  }
}

const token = validarAdmin()

/* =========================
   📺 CARGAR CONTENIDO
========================= */
async function cargarContenido() {
  try {
    const res = await fetch(API + "/series")
    const data = await res.json()

    const cont = document.getElementById("listaAdmin")
    cont.innerHTML = ""

    data.forEach(s => {
      const div = document.createElement("div")
      div.className = "item"

      div.innerHTML = `
        <p><b>${s.titulo}</b> (${s.tipo})</p>
        <button onclick="eliminar('${s._id}')">🗑️ Eliminar</button>
      `

      cont.appendChild(div)
    })

  } catch {
    console.log("Error cargando contenido")
  }
}

/* =========================
   🗑️ ELIMINAR
========================= */
async function eliminar(id) {
  if (!confirm("¿Eliminar contenido?")) return

  await fetch(API + "/serie/" + id, {
    method: "DELETE",
    headers: { Authorization: "Bearer " + token }
  })

  cargarContenido()
}

/* =========================
   🖼️ PREVIEW
========================= */
document.getElementById("portadaInput").addEventListener("change", e => {
  const file = e.target.files[0]
  if (!file) return

  const url = URL.createObjectURL(file)

  document.getElementById("preview").innerHTML = `
    <img src="${url}">
  `
})

/* =========================
   📤 SUBIR PRO (CLOUDINARY DIRECTO)
========================= */
document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault()

  const btn = document.getElementById("btnSubir")
  const status = document.getElementById("status")

  btn.disabled = true
  status.innerText = "Subiendo a la nube..."

  try {
    const videoFile = document.getElementById("videoInput").files[0]
    const portadaFile = document.getElementById("portadaInput").files[0]

    // 🔥 subir video
    const dataVideo = new FormData()
    dataVideo.append("file", videoFile)
    dataVideo.append("upload_preset", "iaflix_upload")

    const resVideo = await fetch(
      `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`,
      { method: "POST", body: dataVideo }
    )

    const videoJson = await resVideo.json()

    // 🔥 subir portada
    const dataImg = new FormData()
    dataImg.append("file", portadaFile)
    dataImg.append("upload_preset", "iaflix_upload")

    const resImg = await fetch(
      `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
      { method: "POST", body: dataImg }
    )

    const imgJson = await resImg.json()

    status.innerText = "Guardando en servidor..."

    // 🔥 guardar en backend
    await fetch(API + "/upload", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify({
        titulo: document.getElementById("titulo").value,
        descripcion: document.getElementById("descripcion").value,
        tipo: document.getElementById("tipo").value,
        video: videoJson.secure_url,
        portada: imgJson.secure_url
      })
    })

    status.innerText = "✅ Subido correctamente"
    alert("🔥 Contenido subido PRO")

    e.target.reset()
    document.getElementById("preview").innerHTML = ""
    cargarContenido()

  } catch (err) {
    console.error(err)
    status.innerText = "❌ Error"
    alert("Error subiendo contenido")
  }

  btn.disabled = false
}

/* =========================
   🚪 LOGOUT
========================= */
function logout() {
  localStorage.removeItem("token")
  location.href = "/login.html"
}

/* =========================
   🚀 INIT
========================= */
if (token) cargarContenido()
</script>

</body>
</html>
