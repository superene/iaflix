<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Admin PRO</title>

<style>
body {
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
}

h1 { margin-top:30px; }

input, textarea, select {
  display:block;
  margin:10px auto;
  padding:10px;
  width:300px;
  border-radius:5px;
  border:none;
}

button {
  padding:10px 15px;
  margin:5px;
  background:red;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:5px;
  font-weight:bold;
}

button:disabled { background:gray; }

#preview img {
  max-width:150px;
  border-radius:5px;
}

.item {
  border-bottom:1px solid #333;
  padding:10px;
}

/* 🔥 BARRA PRO */
#barra {
  width:300px;
  margin:10px auto;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  display:none;
}

#progreso {
  height:20px;
  width:0%;
  background:red;
  text-align:center;
  font-size:12px;
}
</style>
</head>

<body>

<h1>🎬 Panel Admin PRO</h1>

<button onclick="logout()">🚪 Cerrar sesión</button>

<h2>📂 Contenido</h2>
<div id="listaAdmin"></div>

<form id="form">
<input type="text" name="titulo" placeholder="Título" required>
<textarea name="descripcion" placeholder="Descripción"></textarea>

<select name="tipo" required>
  <option value="">Tipo</option>
  <option value="serie">Serie</option>
  <option value="pelicula">Película</option>
  <option value="musica">Música</option>
  <option value="anime">Anime</option>
</select>

<label>Portada</label>
<input type="file" name="portada" id="portadaInput" accept="image/*" required>

<div id="preview"></div>

<label>Video</label>
<input type="file" name="video" id="videoInput" accept="video/*" required>

<button id="btnSubir">Subir</button>

<p id="status"></p>

<!-- 🔥 BARRA -->
<div id="barra">
  <div id="progreso">0%</div>
</div>

</form>

<script>
const API = location.hostname.includes("localhost")
  ? "http://localhost:3000"
  : "https://iaflix.onrender.com"

/* =========================
   🔐 VALIDAR ADMIN
========================= */
function validarAdmin() {
  const token = localStorage.getItem("token")

  if (!token) {
    location.href = "/login.html"
    return null
  }

  try {
    const payload = JSON.parse(atob(token.split(".")[1]))

    if (payload.role !== "admin") {
      localStorage.removeItem("token")
      location.href = "/login.html"
      return null
    }

    return token

  } catch {
    localStorage.removeItem("token")
    location.href = "/login.html"
    return null
  }
}

const token = validarAdmin()

/* =========================
   📺 CARGAR CONTENIDO
========================= */
async function cargarContenido() {
  try {
    const res = await fetch(API + "/series")
    const data = await res.json()

    const cont = document.getElementById("listaAdmin")
    cont.innerHTML = ""

    data.forEach(s => {
      const div = document.createElement("div")
      div.className = "item"

      div.innerHTML = `
        <p><b>${s.titulo}</b> (${s.tipo})</p>
        <button onclick="eliminar('${s._id}')">🗑️ Eliminar</button>
      `

      cont.appendChild(div)
    })

  } catch {
    console.log("Error cargando contenido")
  }
}

/* =========================
   🗑️ ELIMINAR
========================= */
async function eliminar(id) {
  if (!confirm("¿Eliminar contenido?")) return

  try {
    await fetch(API + "/serie/" + id, {
      method: "DELETE",
      headers: { Authorization: "Bearer " + token }
    })

    alert("Eliminado")
    cargarContenido()

  } catch {
    alert("Error eliminando")
  }
}

/* =========================
   🖼️ PREVIEW
========================= */
document.getElementById("portadaInput").addEventListener("change", e => {
  const file = e.target.files[0]
  if (!file) return

  const url = URL.createObjectURL(file)
  document.getElementById("preview").innerHTML = `<img src="${url}">`
})

/* =========================
   📤 SUBIDA CON BARRA REAL
========================= */
document.getElementById("form").onsubmit = (e) => {
  e.preventDefault()

  const btn = document.getElementById("btnSubir")
  const status = document.getElementById("status")
  const barra = document.getElementById("barra")
  const progreso = document.getElementById("progreso")

  const video = document.getElementById("videoInput").files[0]
  const portada = document.getElementById("portadaInput").files[0]

  if (!video || !portada) {
    alert("Selecciona video y portada")
    return
  }

  const formData = new FormData(e.target)

  btn.disabled = true
  barra.style.display = "block"
  status.innerText = "Subiendo..."

  const xhr = new XMLHttpRequest()

  xhr.open("POST", API + "/upload", true)
  xhr.setRequestHeader("Authorization", "Bearer " + token)

  /* 📊 PROGRESO */
  xhr.upload.onprogress = (e) => {
    if (e.lengthComputable) {
      const percent = Math.round((e.loaded / e.total) * 100)

      progreso.style.width = percent + "%"
      progreso.innerText = percent + "%"
    }
  }

  /* ✅ OK */
  xhr.onload = () => {
    btn.disabled = false

    if (xhr.status === 200) {
      status.innerText = "Procesando video..."

      setTimeout(() => {
        status.innerText = "✅ Subido correctamente"
        alert("🔥 Contenido subido PRO")

        document.getElementById("form").reset()
        document.getElementById("preview").innerHTML = ""
        progreso.style.width = "0%"
        progreso.innerText = "0%"
        barra.style.display = "none"

        cargarContenido()
      }, 1000)

    } else {
      console.error(xhr.responseText)
      status.innerText = "❌ Error"
      alert("Error servidor")
    }
  }

  /* ❌ ERROR */
  xhr.onerror = () => {
    btn.disabled = false
    status.innerText = "❌ Error de red"
    alert("Error de conexión")
  }

  xhr.send(formData)
}

/* =========================
   🚪 LOGOUT
========================= */
function logout() {
  localStorage.removeItem("token")
  location.href = "/login.html"
}

/* =========================
   🚀 INIT
========================= */
if (token) cargarContenido()
</script>

</body>
</html>
