<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Admin PRO</title>

<style>
body {
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
}

h1 { margin-top:30px; }

input, textarea, select {
  display:block;
  margin:10px auto;
  padding:10px;
  width:300px;
  border-radius:5px;
  border:none;
}

button {
  padding:10px 15px;
  margin:5px;
  background:red;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:5px;
  font-weight:bold;
}

button:disabled { background:gray; }

#preview img {
  max-width:150px;
  border-radius:5px;
}

.item {
  border-bottom:1px solid #333;
  padding:10px;
}
</style>
</head>

<body>

<h1>🎬 Panel Admin PRO</h1>

<button onclick="logout()">🚪 Cerrar sesión</button>

<h2>📂 Contenido</h2>
<div id="listaAdmin"></div>

<form id="form">
<input type="text" name="titulo" placeholder="Título" required>
<textarea name="descripcion" placeholder="Descripción"></textarea>

<select name="tipo" required>
  <option value="">Tipo</option>
  <option value="serie">Serie</option>
  <option value="pelicula">Película</option>
  <option value="musica">Música</option>
  <option value="anime">Anime</option>
</select>

<label>Portada</label>
<input type="file" id="portadaInput" name="portada" accept="image/*" required>

<div id="preview"></div>

<label>Video</label>
<input type="file" name="video" accept="video/*" required>

<button id="btnSubir">Subir</button>

<p id="status"></p>
</form>

<script>
const API = location.hostname.includes("localhost")
  ? "http://localhost:3000"
  : "https://iaflix.onrender.com"

/* =========================
   🔐 VALIDAR ADMIN (FIX REAL)
========================= */
function validarAdmin() {
  const token = localStorage.getItem("token")

  if (!token) {
    alert("Debes iniciar sesión")
    location.href = "/login.html"
    return null
  }

  try {
    const payload = JSON.parse(atob(token.split(".")[1]))

    if (payload.role !== "admin") {
      alert("No eres admin")
      localStorage.removeItem("token")
      location.href = "/login.html"
      return null
    }

    return token

  } catch (err) {
    console.log("Token inválido")
    localStorage.removeItem("token")
    location.href = "/login.html"
    return null
  }
}

const token = validarAdmin()

/* =========================
   📺 CARGAR CONTENIDO
========================= */
async function cargarContenido() {
  try {
    const res = await fetch(API + "/series")

    const text = await res.text()

    let data
    try {
      data = JSON.parse(text)
    } catch {
      console.error("Respuesta no JSON:", text)
      return
    }

    const cont = document.getElementById("listaAdmin")
    cont.innerHTML = ""

    if (!Array.isArray(data)) return

    data.forEach(s => {
      const div = document.createElement("div")
      div.className = "item"

      div.innerHTML = `
        <p><b>${s.titulo}</b> (${s.tipo})</p>
        <button onclick="eliminar('${s._id}')">🗑️ Eliminar</button>
      `

      cont.appendChild(div)
    })

  } catch {
    console.log("Error cargando contenido")
  }
}

/* =========================
   🗑️ ELIMINAR
========================= */
async function eliminar(id) {
  if (!confirm("¿Eliminar contenido?")) return

  try {
    const res = await fetch(API + "/serie/" + id, {
      method: "DELETE",
      headers: { Authorization: "Bearer " + token }
    })

    const data = await res.json().catch(()=>({}))

    alert(data.mensaje || "Eliminado")
    cargarContenido()

  } catch {
    alert("Error eliminando")
  }
}

/* =========================
   🖼️ PREVIEW
========================= */
document.getElementById("portadaInput").addEventListener("change", e => {
  const file = e.target.files[0]
  if (!file) return

  const url = URL.createObjectURL(file)

  document.getElementById("preview").innerHTML = `
    <img src="${url}">
  `
})

/* =========================
   📤 SUBIR
========================= */
document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault()

  const btn = document.getElementById("btnSubir")
  const status = document.getElementById("status")

  btn.disabled = true
  status.innerText = "Subiendo..."

  const formData = new FormData(e.target)

  try {
    const res = await fetch(API + "/upload", {
      method: "POST",
      headers: {
        Authorization: "Bearer " + token
      },
      body: formData
    })

    const text = await res.text()

    let data
    try {
      data = JSON.parse(text)
    } catch {
      console.error("Respuesta inválida:", text)
      throw new Error()
    }

    if (!res.ok) throw new Error(data.mensaje)

    status.innerText = "✅ Subido"
    alert("Contenido subido 🔥")

    e.target.reset()
    document.getElementById("preview").innerHTML = ""

    cargarContenido()

  } catch (err) {
    console.error(err)
    status.innerText = "❌ Error"
    alert("Error subiendo")
  }

  btn.disabled = false
}

/* =========================
   🚪 LOGOUT
========================= */
function logout() {
  localStorage.removeItem("token")
  location.href = "/login.html"
}

/* =========================
   🚀 INIT
========================= */
if (token) {
  cargarContenido()
}
</script>

</body>
</html>
