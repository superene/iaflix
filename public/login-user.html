<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login Netflix</title>

<style>
body {
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  background:black;
  padding:40px;
  border-radius:10px;
  width:300px;
  text-align:center;
}

h2 {
  margin-bottom:20px;
}

input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:5px;
}

button {
  width:100%;
  padding:10px;
  background:red;
  color:white;
  border:none;
  border-radius:5px;
  font-weight:bold;
  cursor:pointer;
}

button:hover {
  background:#e50914;
}

.error {
  color:red;
  margin-top:10px;
}

.link {
  margin-top:15px;
  display:block;
  color:#aaa;
  cursor:pointer;
}

.link:hover {
  color:white;
}
</style>
</head>

<body>

<div class="container">
  <h2>🎬 Iniciar sesión</h2>

  <form id="form">
    <input type="text" id="username" placeholder="Usuario" required>
    <input type="password" id="password" placeholder="Contraseña" required>
    <button type="submit">Entrar</button>
  </form>

  <p class="error" id="error"></p>

  <span class="link" onclick="irRegistro()">Crear cuenta</span>
</div>

<script>
// 🔥 API dinámica
const API = window.location.origin

function irRegistro(){
  window.location.href = "/register.html"
}

// limpiar token viejo
localStorage.removeItem("token")

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault()

  const username = document.getElementById("username").value.trim()
  const password = document.getElementById("password").value.trim()

  const error = document.getElementById("error")
  error.innerText = ""

  if (!username || !password) {
    error.innerText = "Completa todos los campos"
    return
  }

  try {
    const API = window.location.origin

const res = await fetch(API + "/login-user", {
  method: "POST",
  headers: {"Content-Type":"application/json"},
  body: JSON.stringify({ username, password })
})

    const data = await res.json().catch(() => ({}))

    if (res.ok && data.token) {
      localStorage.setItem("token", data.token)

      // 🚀 ir a perfiles
      window.location.href = "/perfiles.html"

    } else {
      error.innerText = data.mensaje || "❌ Usuario o contraseña incorrectos"
    }

  } catch (err) {
    error.innerText = "❌ Error conectando con el servidor"
  }
})
</script>

</body>
</html>
